<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Luxe Kozijnen — Opname</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#1b1e25; --ink-soft:#2a2e37;
    --paper:#f6f4ef; --card:#ffffff;
    --brass:#b0815a; --brass-dark:#8c6443;
    --line:#e6e1d8; --muted:#6c7077;
    --ok:#2f7d5b; --danger:#b3463c;
    --radius:14px;
    --shadow:0 1px 2px rgba(27,30,37,.05), 0 8px 24px rgba(27,30,37,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:15px; line-height:1.45;
    -webkit-text-size-adjust:100%;
  }
  /* ---------- Header ---------- */
  header.topbar{
    position:sticky; top:0; z-index:50;
    background:var(--ink); color:#fff;
    display:flex; align-items:center; gap:14px;
    padding:12px 18px; flex-wrap:wrap;
    border-bottom:3px solid var(--brass);
  }
  .brand{display:flex; flex-direction:column; line-height:1; margin-right:auto;}
  .brand .name{font-family:'Fraunces',serif; font-weight:600; font-size:22px; letter-spacing:.3px;}
  .brand-logo{height:36px; width:auto; display:block;}
  .brand .sub{font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--brass); margin-top:4px;}
  .actions{display:flex; gap:8px; flex-wrap:wrap;}
  .btn{
    font-family:inherit; font-weight:600; font-size:14px;
    border:1px solid transparent; border-radius:10px;
    padding:10px 16px; cursor:pointer; white-space:nowrap;
    transition:transform .06s ease, background .15s ease, border-color .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--brass); color:#fff;}
  .btn-primary:hover{background:var(--brass-dark);}
  .btn-ghost{background:transparent; color:#fff; border-color:rgba(255,255,255,.25);}
  .btn-ghost:hover{border-color:#fff;}
  .btn-danger-ghost{background:transparent; color:#f0b6b0; border-color:rgba(240,182,176,.3);}
  .btn-danger-ghost:hover{border-color:#f0b6b0;}

  /* ---------- Layout ---------- */
  .wrap{max-width:1000px; margin:0 auto; padding:24px 18px 80px;}
  .panel{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);
    margin-bottom:22px; overflow:hidden;
  }
  .panel-head{
    padding:16px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px;
  }
  .panel-head h2{
    margin:0; font-family:'Fraunces',serif; font-weight:600; font-size:18px;
  }
  .panel-head .tag{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-left:auto;}
  .panel-body{padding:18px 20px;}
  .grid{display:grid; gap:14px;}
  .g2{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:640px){ .g2,.g3{grid-template-columns:1fr;} }

  label.field{display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.4px;}
  input, select, textarea{
    font-family:inherit; font-size:15px; color:var(--ink);
    background:#fff; border:1px solid var(--line); border-radius:9px;
    padding:11px 12px; font-weight:500;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--brass); box-shadow:0 0 0 3px rgba(176,129,90,.15);}
  textarea{resize:vertical; min-height:54px;}

  /* ---------- Kozijn card ---------- */
  .kozijn{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);
    margin-bottom:22px; overflow:hidden;
  }
  .kozijn-head{
    display:flex; align-items:center; gap:12px;
    padding:14px 18px; background:#fbfaf7; border-bottom:1px solid var(--line);
  }
  .knum{
    width:34px; height:34px; border-radius:8px; background:var(--ink); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex:0 0 auto;
  }
  .kozijn-head .ruimte{flex:1;}
  .kozijn-head .ruimte input{width:100%; font-family:'Fraunces',serif; font-size:17px; font-weight:600; border:none; background:transparent; padding:6px 0;}
  .kozijn-head .ruimte input:focus{box-shadow:none; border-bottom:2px solid var(--brass);}
  .del-koz{background:transparent; border:none; color:var(--danger); cursor:pointer; font-weight:600; font-size:13px; padding:8px;}

  /* ---------- Canvas ---------- */
  .pad-wrap{padding:16px 18px;}
  .toolbar{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .tool{
    border:1px solid var(--line); background:#fff; border-radius:8px;
    padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft);
    display:inline-flex; align-items:center; gap:6px;
  }
  .tool.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .tool.magic{background:#faf4ee; border-color:var(--brass); color:var(--brass-dark);}
  .tool.magic:hover{background:#f3e7da;}
  .sep{width:1px; height:24px; background:var(--line); margin:0 4px;}
  .swatch{width:26px; height:26px; border-radius:7px; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); cursor:pointer; padding:0;}
  .swatch.active{box-shadow:0 0 0 2px var(--brass);}
  .sizes{display:flex; gap:4px;}
  .size{width:30px; height:30px; border:1px solid var(--line); border-radius:7px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .size.active{border-color:var(--brass); background:#faf4ee;}
  .size .dot{background:var(--ink); border-radius:50%;}
  .canvas-frame{
    position:relative; border:1px solid var(--line); border-radius:10px; overflow:hidden;
    background-color:#fff;
    background-image:linear-gradient(#eef0ee 1px, transparent 1px), linear-gradient(90deg,#eef0ee 1px, transparent 1px);
    background-size:25px 25px;
  }
  canvas.pad{display:block; width:100%; touch-action:none; cursor:crosshair;}

  .specs{padding:0 18px 18px;}

  /* ---------- Add button ---------- */
  .add-koz{
    width:100%; padding:16px; border:2px dashed var(--brass); border-radius:var(--radius);
    background:#fbf6f1; color:var(--brass-dark); font-weight:700; font-size:15px; cursor:pointer;
    margin-bottom:30px;
  }
  .add-koz:hover{background:#f8efe6;}

  .hint{font-size:12.5px; color:var(--muted); margin-top:6px;}
  .footer-note{text-align:center; color:var(--muted); font-size:12px; padding:10px 0 0;}

  @media print{ body{display:none;} }
</style>
</head>

/* ============ Canvas pad ============ */
const LW=1000, LH=380;          // logische tekenmaat (verhouding ~2.6:1)
const pads={};                   // id -> controller

/* ---- hulpfuncties voor auto-correctie ---- */
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function lineDist(p,a,b){               // afstand punt tot oneindige lijn a-b
  const dx=b.x-a.x, dy=b.y-a.y;
  if(dx===0&&dy===0) return dist(p,a);
  const t=((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy);
  return dist(p, {x:a.x+t*dx, y:a.y+t*dy});
}
function rdp(pts, eps){                  // vereenvoudig pad tot hoekpunten
  if(pts.length<3) return pts.slice();
  let dmax=0, idx=0;
  const a=pts[0], b=pts[pts.length-1];
  for(let i=1;i<pts.length-1;i++){
    const d=lineDist(pts[i],a,b);
    if(d>dmax){ dmax=d; idx=i; }
  }
  if(dmax>eps){
    const left=rdp(pts.slice(0,idx+1),eps);
    const right=rdp(pts.slice(idx),eps);
    return left.slice(0,-1).concat(right);
  }
  return [a,b];
}
function beautifyStroke(pts){
  if(pts.length<2) return null;
  let xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const diag=Math.hypot(Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys));
  if(diag<14) return null;               // te klein, laat met rust
  let s=rdp(pts, Math.max(9, diag*0.04));
  const closed = dist(s[0], s[s.length-1]) < Math.max(34, diag*0.14);
  // segmenten recht zetten: bijna horizontaal -> horizontaal, bijna verticaal -> verticaal
  const tan=Math.tan(22*Math.PI/180);
  for(let i=1;i<s.length;i++){
    const dx=s[i].x-s[i-1].x, dy=s[i].y-s[i-1].y;
    if(Math.abs(dy) < Math.abs(dx)*tan)      s[i]={x:s[i].x, y:s[i-1].y};   // horizontaal
    else if(Math.abs(dx) < Math.abs(dy)*tan) s[i]={x:s[i-1].x, y:s[i].y};   // verticaal
  }
  const corners = s.length - 1;
  if(closed && corners===4){             // nette rechthoek van de omhullende
    const X=s.map(p=>p.x), Y=s.map(p=>p.y);
    const x0=Math.min(...X), x1=Math.max(...X), y0=Math.min(...Y), y1=Math.max(...Y);
    return {kind:'rect', x:x0, y:y0, w:x1-x0, h:y1-y0};
  }
  if(closed) s.push({x:s[0].x, y:s[0].y});
  return {kind:'poly', points:s};
}

function makePad(canvas){
  const dpr=window.devicePixelRatio||1;
  canvas.width=LW*dpr; canvas.height=LH*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.lineCap='round'; ctx.lineJoin='round';

  const ctrl={
    canvas, ctx, dpr,
    tool:'pen', color:'#1b1e25', size:3,
    drawing:false, items:[], cur:null, undoStack:[]
  };

  function pos(e){
    const r=canvas.getBoundingClientRect();
    return { x:(e.clientX-r.left)/r.width*LW, y:(e.clientY-r.top)/r.height*LH };
  }
  function drawItem(it){
    ctx.globalCompositeOperation = it.erase ? 'destination-out' : 'source-over';
    ctx.strokeStyle=it.color; ctx.lineWidth=it.size;
    if(it.type==='rect'){ ctx.strokeRect(it.x, it.y, it.w, it.h); return; }
    const p=it.points; if(!p||p.length<1) return;
    ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y);
    for(let i=1;i<p.length;i++) ctx.lineTo(p[i].x, p[i].y);
    if(p.length===1) ctx.lineTo(p[0].x+0.01, p[0].y+0.01);
    ctx.stroke();
  }
  function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctrl.items.forEach(drawItem);
    if(ctrl.cur) drawItem(ctrl.cur);
    ctx.globalCompositeOperation='source-over';
  }
  function pushUndo(){
    ctrl.undoStack.push(JSON.parse(JSON.stringify(ctrl.items)));
    if(ctrl.undoStack.length>30) ctrl.undoStack.shift();
  }

  function down(e){
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    const p=pos(e);
    ctrl.drawing=true;
    pushUndo();
    if(ctrl.tool==='pen'||ctrl.tool==='eraser'){
      ctrl.cur={type:'pen', erase:ctrl.tool==='eraser', color:ctrl.color,
                size: ctrl.tool==='eraser'?ctrl.size*6:ctrl.size, points:[p]};
    } else if(ctrl.tool==='line'){
      ctrl.cur={type:'line', color:ctrl.color, size:ctrl.size, points:[p,{...p}]};
    } else if(ctrl.tool==='rect'){
      ctrl.cur={type:'rect', color:ctrl.color, size:ctrl.size, x:p.x, y:p.y, w:0, h:0, _sx:p.x, _sy:p.y};
    }
    render();
  }
  function move(e){
    if(!ctrl.drawing||!ctrl.cur) return;
    e.preventDefault();
    const p=pos(e);
    if(ctrl.cur.type==='pen'){ ctrl.cur.points.push(p); }
    else if(ctrl.cur.type==='line'){ ctrl.cur.points[1]=p; }
    else if(ctrl.cur.type==='rect'){ ctrl.cur.x=Math.min(ctrl.cur._sx,p.x); ctrl.cur.y=Math.min(ctrl.cur._sy,p.y); ctrl.cur.w=Math.abs(p.x-ctrl.cur._sx); ctrl.cur.h=Math.abs(p.y-ctrl.cur._sy); }
    render();
  }
  function up(){
    if(!ctrl.drawing) return;
    ctrl.drawing=false;
    if(ctrl.cur){ ctrl.items.push(ctrl.cur); ctrl.cur=null; }
    render();
  }
  canvas.addEventListener('pointerdown',down);
  canvas.addEventListener('pointermove',move);
  canvas.addEventListener('pointerup',up);
  canvas.addEventListener('pointercancel',up);
  canvas.addEventListener('pointerleave',up);

  ctrl.undo=function(){ if(ctrl.undoStack.length){ ctrl.items=ctrl.undoStack.pop(); render(); } };
  ctrl.clear=function(){ if(!ctrl.items.length) return; pushUndo(); ctrl.items=[]; render(); };
  ctrl.beautify=function(){
    let changed=false;
    pushUndo();
    ctrl.items = ctrl.items.map(it=>{
      if(it.type!=='pen'||it.erase) return it;
      const r=beautifyStroke(it.points);
      if(!r) return it;
      changed=true;
      if(r.kind==='rect') return {type:'rect', color:it.color, size:it.size, x:r.x, y:r.y, w:r.w, h:r.h};
      return {type:'pen', color:it.color, size:it.size, points:r.points};
    });
    if(!changed) ctrl.undoStack.pop();   // niks veranderd: undo niet vervuilen
    render();
  };
  ctrl.toImage=function(){
    const out=document.createElement('canvas');
    out.width=canvas.width; out.height=canvas.height;
    const o=out.getContext('2d');
    o.fillStyle='#ffffff'; o.fillRect(0,0,out.width,out.height);
    o.drawImage(canvas,0,0);
    return out.toDataURL('image/png');
  };
  return ctrl;
}

/* ============ Kozijn toevoegen ============ */
let kozCount=0;
const types=['Draaikiepraam','Vast glas','Draairaam','Valraam','Schuifpui','Voordeur','Achterdeur','Tuindeuren','Dakraam','Anders'];
const glassen=['HR++','Triple (HR+++)','Dubbel glas','Anders'];

function addKozijn(){
  kozCount++;
  const id='koz'+kozCount;
  const num=document.querySelectorAll('.kozijn').length+1;
  const div=document.createElement('div');
  div.className='kozijn'; div.id=id;
  div.innerHTML=`
    <div class="kozijn-head">
      <div class="knum" data-num>${num}</div>
      <div class="ruimte"><input placeholder="Ruimte / locatie (bijv. Woonkamer voorzijde)" data-f="ruimte"></div>
      <button class="del-koz" onclick="removeKozijn('${id}')">Verwijderen</button>
    </div>
    <div class="pad-wrap">
      <div class="toolbar">
        <button class="tool active" data-tool="pen">✎ Pen</button>
        <button class="tool" data-tool="line">／ Lijn</button>
        <button class="tool" data-tool="rect">▭ Kader</button>
        <button class="tool" data-tool="eraser">⌫ Gum</button>
        <span class="sep"></span>
        <button class="swatch active" style="background:#1b1e25" data-color="#1b1e25"></button>
        <button class="swatch" style="background:#1d5fb5" data-color="#1d5fb5"></button>
        <button class="swatch" style="background:#b3463c" data-color="#b3463c"></button>
        <span class="sep"></span>
        <div class="sizes">
          <button class="size" data-size="2"><span class="dot" style="width:4px;height:4px"></span></button>
          <button class="size active" data-size="3"><span class="dot" style="width:7px;height:7px"></span></button>
          <button class="size" data-size="6"><span class="dot" style="width:11px;height:11px"></span></button>
        </div>
        <span class="sep"></span>
        <button class="tool magic" data-act="beauty">✨ Netjes maken</button>
        <button class="tool" data-act="undo">↺ Terug</button>
        <button class="tool" data-act="clear">Wissen</button>
      </div>
      <div class="canvas-frame"><canvas class="pad"></canvas></div>
      <p class="hint">Teken het kozijn uit de losse hand. Tik daarna op “✨ Netjes maken” — dan worden je lijnen recht en je hoeken haaks. Niet goed? Tik op “↺ Terug”.</p>
    </div>
    <div class="specs grid g3">
      <label class="field">Breedte (mm) <input type="number" inputmode="numeric" data-f="breedte" placeholder="bijv. 1200"></label>
      <label class="field">Hoogte (mm) <input type="number" inputmode="numeric" data-f="hoogte" placeholder="bijv. 1500"></label>
      <label class="field">Aantal <input type="number" inputmode="numeric" data-f="aantal" value="1"></label>
      <label class="field">Type <select data-f="type">${types.map(t=>`<option>${t}</option>`).join('')}</select></label>
      <label class="field">Glas <select data-f="glas">${glassen.map(g=>`<option>${g}</option>`).join('')}</select></label>
      <label class="field">Kleur / RAL <input data-f="kleur" placeholder="bijv. RAL 7016 antraciet"></label>
      <label class="field" style="grid-column:1 / -1">Opmerking <textarea data-f="opmerking" placeholder="Draairichting, dorpel, hor, etc."></textarea></label>
    </div>
  `;
  document.getElementById('kozijnen').appendChild(div);

  const canvas=div.querySelector('canvas.pad');
  const ctrl=makePad(canvas);
  pads[id]=ctrl;

  // toolbar koppelen
  div.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{
    div.querySelectorAll('[data-tool]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); ctrl.tool=b.dataset.tool;
  });
  div.querySelectorAll('[data-color]').forEach(b=>b.onclick=()=>{
    div.querySelectorAll('[data-color]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); ctrl.color=b.dataset.color;
  });
  div.querySelectorAll('[data-size]').forEach(b=>b.onclick=()=>{
    div.querySelectorAll('[data-size]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); ctrl.size=parseInt(b.dataset.size);
  });
  div.querySelector('[data-act="beauty"]').onclick=()=>ctrl.beautify();
  div.querySelector('[data-act="undo"]').onclick=()=>ctrl.undo();
  div.querySelector('[data-act="clear"]').onclick=()=>ctrl.clear();

  div.scrollIntoView({behavior:'smooth', block:'center'});
}

function removeKozijn(id){
  const el=document.getElementById(id);
  if(el){ el.remove(); delete pads[id]; renumber(); }
}
function renumber(){
  document.querySelectorAll('.kozijn').forEach((el,i)=>{ el.querySelector('[data-num]').textContent=i+1; });
}

/* ============ PDF bouwen ============ */
function val(id){ return (document.getElementById(id).value||'').trim(); }
function field(el,name){ const e=el.querySelector(`[data-f="${name}"]`); return e?(e.value||'').trim():''; }

function buildPdf(){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'mm', format:'a4'});
  const PW=210, M=16; let y=18;

  // ---- Briefhoofd ----
  const LOGO_W=52, LOGO_H=13;
  try{ doc.addImage(LOGO_DATA,'PNG', M, 12, LOGO_W, LOGO_H); }catch(e){}
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(108,112,119);
  let ry=13;
  [val('b_adres'), val('b_plaats'), val('b_tel'), val('b_email'), val('b_web')].filter(Boolean)
    .forEach(line=>{ doc.text(line, PW-M, ry, {align:'right'}); ry+=4.4; });
  y=Math.max(12+LOGO_H, ry-4.4)+5;
  doc.setDrawColor(176,129,90); doc.setLineWidth(0.8); doc.line(M,y,PW-M,y); y+=10;

  // ---- Titel ----
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(27,30,37);
  doc.text('Kozijnopname', M, y); y+=8;

  // ---- Klant + datum blok ----
  doc.setFontSize(8); doc.setTextColor(140,100,67); doc.setFont('helvetica','bold');
  doc.text('KLANT', M, y);
  doc.text('GEGEVENS', PW-M-40, y);
  y+=5;
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(27,30,37);
  const klant=[val('k_naam'), val('k_adres'), val('k_plaats'), val('k_tel'), val('k_email')].filter(Boolean);
  const meta=[];
  if(val('k_datum')){ const d=val('k_datum').split('-'); meta.push('Datum: '+d[2]+'-'+d[1]+'-'+d[0]); }
  if(val('k_ref')) meta.push('Referentie: '+val('k_ref'));
  const rows=Math.max(klant.length, meta.length);
  let by=y;
  for(let i=0;i<rows;i++){
    if(klant[i]) doc.text(klant[i], M, by);
    if(meta[i]) doc.text(meta[i], PW-M-40, by);
    by+=5;
  }
  y=by+6;
  doc.setDrawColor(230,225,216); doc.setLineWidth(0.3); doc.line(M,y,PW-M,y); y+=8;

  // ---- Kozijnen ----
  const cards=document.querySelectorAll('.kozijn');
  const imgW=92, imgH=imgW*(LH/LW); // verhouding

  cards.forEach((el,i)=>{
    const ruimte=field(el,'ruimte');
    const specs=[
      ['Afmeting (B×H)', (field(el,'breedte')||'?')+' × '+(field(el,'hoogte')||'?')+' mm'],
      ['Type', field(el,'type')],
      ['Aantal', field(el,'aantal')||'1'],
      ['Glas', field(el,'glas')],
      ['Kleur / RAL', field(el,'kleur')||'—'],
    ];
    const opm=field(el,'opmerking');

    const blockH=Math.max(imgH, specs.length*6+4)+22;
    if(y+blockH > 280){ doc.addPage(); y=20; }

    // kop
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(27,30,37);
    doc.text('Kozijn '+(i+1)+(ruimte?'  —  '+ruimte:''), M, y);
    y+=5;

    // tekening
    const id=el.id, ctrl=pads[id];
    let imgBottom=y;
    if(ctrl){
      try{
        const data=ctrl.toImage();
        doc.setDrawColor(230,225,216); doc.setLineWidth(0.3);
        doc.rect(M, y, imgW, imgH);
        doc.addImage(data,'PNG', M, y, imgW, imgH);
        imgBottom=y+imgH;
      }catch(e){ imgBottom=y; }
    }

    // specs rechts
    let sx=M+imgW+8, sy=y+3;
    specs.forEach(([k,v])=>{
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(140,100,67);
      doc.text(k.toUpperCase(), sx, sy);
      doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(27,30,37);
      doc.text(String(v||'—'), sx, sy+4.6);
      sy+=10.5;
    });

    y=Math.max(imgBottom, sy)+4;

    if(opm){
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(140,100,67);
      doc.text('OPMERKING', M, y); y+=4.6;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(27,30,37);
      const lines=doc.splitTextToSize(opm, PW-2*M);
      doc.text(lines, M, y); y+=lines.length*4.6;
    }
    y+=4;
    doc.setDrawColor(230,225,216); doc.setLineWidth(0.3); doc.line(M,y,PW-M,y); y+=8;
  });

  if(cards.length===0){
    doc.setFont('helvetica','italic'); doc.setFontSize(11); doc.setTextColor(108,112,119);
    doc.text('Nog geen kozijnen toegevoegd.', M, y);
  }

  // ---- Voettekst op elke pagina ----
  const pages=doc.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(160,160,160);
    doc.text((val('b_naam')||'Luxe Kozijnen')+'  ·  '+(val('b_web')||''), M, 290);
    doc.text('Pagina '+p+' / '+pages, PW-M, 290, {align:'right'});
  }
  return doc;
}

function fileName(){
  const k=val('k_naam').replace(/[^\w\u00C0-\u017F-]+/g,'_')||'klant';
  return 'Kozijnopname_'+k+'_'+val('k_datum')+'.pdf';
}
function savePdf(){ try{ buildPdf().save(fileName()); }catch(e){ alert('Er ging iets mis bij het maken van de PDF: '+e.message); } }
function printPdf(){
  try{
    const url=buildPdf().output('bloburl');
    const w=window.open(url,'_blank');
    if(!w) alert('Sta pop-ups toe om te kunnen printen, of gebruik “PDF opslaan”.');
  }catch(e){ alert('Er ging iets mis: '+e.message); }
}

/* start met 1 kozijn */
addKozijn();
</script>
</body>
</html>
